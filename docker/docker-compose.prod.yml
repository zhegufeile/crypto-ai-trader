services:
  db:
    image: postgres:16-alpine
    env_file:
      - ../.env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  trader:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_UID: ${APP_UID:-1001}
        APP_GID: ${APP_GID:-1002}
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      FRONTEND_ORIGINS: '["https://www.pluseclould.xyz"]'
    restart: unless-stopped
    volumes:
      - ../data:/app/data

  caddy:
    image: caddy:2
    depends_on:
      - trader
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: www.pluseclould.xyz
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
